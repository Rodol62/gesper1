{% extends 'base.html' %}
{% block title %}Cambia Password Admin — Gesper{% endblock %}

{% block content %}
<div style="max-width:400px;margin:2rem auto">
  <div style="background:linear-gradient(135deg,var(--c-primary),var(--c-accent));color:#fff;border-radius:6px;padding:.7rem 1rem;margin-bottom:.8rem">
    <h4 style="margin:0;font-size:.9rem;font-weight:800"><i class="bi bi-key-fill"></i> Cambia Password Amministratore</h4>
  </div>

  <div class="card">
    <div class="card-body">
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label for="nuova_password" class="form-label">Nuova password</label>
          <input type="password" name="nuova_password" id="nuova_password" required class="form-control">
        </div>
        <button type="submit" class="btn btn-primary btn-sm w-100">
          <i class="bi bi-check-circle"></i> Aggiorna password
        </button>
      </form>
    </div>
  </div>

  {% if messages %}
  <div class="mt-2">
    {% for message in messages %}
    <div class="alert alert-{{ message.tags|default:'info' }} py-2" style="font-size:var(--sz-sm)">
      {{ message }}
    </div>
    {% endfor %}
  </div>
  {% endif %}
</div>
{% endblock %}
