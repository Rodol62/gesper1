<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cedolino — {{ pdf_label }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
  :root {
    --c-primary: #1b3a5f;
    --c-accent: #2d6199;
    --c-green: #0a6640;
    --c-border: #c5d0dc;
    --c-muted: #5c6b7d;
    --c-alt: #f4f7fa;
  }
  .text-euro { text-align: right !important; font-variant-numeric: tabular-nums; white-space: nowrap; }
  .ced-top {
    background: var(--c-primary);
    color: #fff;
    padding: .55rem 1rem;
    border-radius: 6px;
    margin-bottom: .85rem;
  }
  .ced-top h1 { font-size: 1.05rem; font-weight: 700; margin: 0; line-height: 1.25; }
  .ced-top .sub { font-size: .78rem; opacity: .9; margin: .35rem 0 0; word-break: break-all; }
  .ced-section {
    border: 1px solid var(--c-border);
    border-radius: 6px;
    margin-bottom: .75rem;
    overflow: hidden;
    background: #fff;
  }
  .ced-section h2 {
    background: var(--c-primary);
    color: #fff;
    font-size: .72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .05em;
    margin: 0;
    padding: .4rem .75rem;
  }
  .ced-kv { margin: 0; font-size: .82rem; }
  .ced-kv dt {
    color: var(--c-muted);
    font-weight: 600;
    font-size: .74rem;
    padding: .35rem .75rem 0;
  }
  .ced-kv dd {
    margin: 0;
    padding: .1rem .75rem .4rem;
    border-bottom: 1px solid #e8edf2;
    font-variant-numeric: tabular-nums;
  }
  .ced-kv dd:last-of-type { border-bottom: none; }
  .ced-note {
    font-size: .78rem;
    color: var(--c-muted);
    border-left: 3px solid var(--c-accent);
    padding: .4rem .65rem;
    background: var(--c-alt);
    border-radius: 0 4px 4px 0;
    margin-bottom: .85rem;
  }
  .ced-table-wrap { padding: 0 .5rem .5rem; }
  .ced-table-wrap .table { font-size: .78rem; margin-bottom: 0; }
  .ced-table-wrap .table th { font-size: .68rem; text-transform: uppercase; letter-spacing: .03em; color: var(--c-muted); }
  </style>
</head>
<body class="bg-light">
  <div class="container py-4" style="max-width: 920px;">
    <div class="ced-top">
      <h1><i class="bi bi-table me-1"></i> Estrazione cedolino (anteprima file)</h1>
      <p class="sub mb-0"><i class="bi bi-file-earmark-pdf me-1"></i> {{ pdf_path }}</p>
    </div>

    <p class="ced-note">
      Generato dalla prima pagina del PDF (regex layout TeamSystem). Include dati azienda/datore se presenti nel testo estratto.
    </p>

    {% include "documenti/_cedolino_busta_sections.html" %}
  </div>
</body>
</html>
