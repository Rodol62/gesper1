<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ titolo|default:"Anteprima" }} — GESPER</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    html, body { height: 100%; margin: 0; }
    .viewer-toolbar { flex-shrink: 0; }
    .viewer-frame { flex: 1; min-height: 0; border: 0; width: 100%; }
  </style>
</head>
<body class="d-flex flex-column" style="min-height:100vh;background:#eef2f6;">
  <div class="viewer-toolbar d-flex align-items-center gap-2 px-3 py-2 bg-white border-bottom shadow-sm flex-wrap">
    <a href="{{ next_url }}" class="btn btn-sm btn-outline-secondary">
      <i class="bi bi-arrow-left"></i> Torna
    </a>
    <span class="small text-muted">{{ titolo|default:"Anteprima file" }}</span>
    {% if documento_id and documento_storage_path %}
      <span class="badge text-bg-light border text-dark">
        Rif. #{{ documento_id }} -> {{ documento_storage_path }}
      </span>
    {% endif %}
  </div>
  <iframe class="viewer-frame" src="{{ embed_src }}" title="{{ titolo|default:'Anteprima' }}"></iframe>
</body>
</html>
