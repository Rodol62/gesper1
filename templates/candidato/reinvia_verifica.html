<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reinvia verifica — GESPER</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #e8eef5 0%, #dde6f0 100%);
      font-family: Arial, sans-serif; font-size: 14px; color: #222;
    }
    .card {
      background: #fff; border-radius: 10px; box-shadow: 0 2px 20px rgba(0,0,0,.1);
      padding: 36px 32px; max-width: 420px; width: 100%;
    }
    h1 { font-size: 1.1rem; color: #1b3a5f; margin-bottom: 12px; }
    p { color: #555; line-height: 1.6; margin-bottom: 16px; font-size: .86rem; }
    label { display: block; font-size: .8rem; font-weight: 600; color: #5c6b7d; margin-bottom: 4px; }
    input[type=email] {
      width: 100%; padding: 8px 10px; border: 1px solid #c5d0dc;
      border-radius: 4px; font-size: .88rem; margin-bottom: 14px;
    }
    button { width: 100%; padding: 10px; background: #1b3a5f; color: #fff;
             border: none; border-radius: 4px; font-size: .9rem; font-weight: 700; cursor: pointer; }
    .back { display: block; text-align: center; margin-top: 14px;
            font-size: .78rem; color: #2d6199; text-decoration: none; }
  </style>
<style>html{font-size:16px}:root{--sz-xs:.82rem;--sz-sm:.92rem;--sz-base:1rem}</style>
</head>
<body>
<div class="card">
  <h1><i class="bi bi-envelope-arrow-up"></i> Reinvia link di verifica</h1>
  <p>Inserisci l'indirizzo e-mail con cui ti sei registrato/a. Ti invieremo un nuovo link di verifica.</p>
  <form method="post">
    {% csrf_token %}
    <label for="email">Indirizzo e-mail</label>
    <input type="email" name="email" id="email" required autocomplete="email" placeholder="nome@esempio.it">
    <button type="submit"><i class="bi bi-send"></i> Invia nuovo link</button>
  </form>
  <a href="{% url 'login' %}" class="back">← Torna al login</a>
</div>
</body>
</html>
