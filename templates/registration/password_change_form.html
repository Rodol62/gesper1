{% extends 'base.html' %}
{% block title %}Cambia Password{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow">
      <div class="card-header bg-primary text-white">
        <h4 class="mb-0">Cambia Password</h4>
      </div>
      <div class="card-body">
        <form method="post">
          {% csrf_token %}
          {% for field in form %}
            <div class="mb-3">
              <label for="{{ field.id_for_label }}" class="form-label fw-semibold">{{ field.label }}</label>
              <input type="password" class="form-control {% if field.errors %}is-invalid{% endif %}"
                     id="{{ field.id_for_label }}" name="{{ field.html_name }}" required>
              {% for error in field.errors %}
                <div class="invalid-feedback">{{ error }}</div>
              {% endfor %}
            </div>
          {% endfor %}
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Aggiorna password</button>
            <a href="{% url 'edit_profile' %}" class="btn btn-secondary">Annulla</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
