<style>
.gesper-help {
  border: 1px solid var(--bs-border-color, #dee2e6);
  border-radius: 0.375rem;
  border-left: 3px solid rgba(13, 110, 253, 0.45);
  background: var(--bs-light, #f8f9fa);
  margin-bottom: 0.75rem;
}
.gesper-help > summary {
  cursor: pointer;
  font-size: 0.8125rem;
  padding: 0.45rem 0.65rem;
  color: #1b3a5f;
  user-select: none;
  list-style: none;
}
.gesper-help > summary::-webkit-details-marker { display: none; }
.gesper-help > summary::marker { content: ''; }
.gesper-help .gesper-help-summary-inner {
  display: inline-flex;
  align-items: flex-start;
  gap: 0.35rem;
}
.gesper-help .gesper-help-summary-icon {
  font-size: 0.95rem;
  line-height: 1.25;
  color: var(--bs-primary);
  opacity: 0.9;
  flex-shrink: 0;
  margin-top: 0.06rem;
}
.gesper-help .gesper-help-summary-text { line-height: 1.35; }
.gesper-help .gesper-help-summary-title { font-weight: 600; }
.gesper-help[open] { border-left-color: var(--bs-primary); }
.gesper-help .gesper-help-body {
  padding: 0 0.75rem 0.65rem;
  border-top: 1px solid rgba(0, 0, 0, 0.06);
}
.gesper-help .gesper-help-body > p:last-child { margin-bottom: 0; }
.gesper-help-compact > summary { font-size: 0.8125rem; }
.gesper-help-compact .gesper-help-summary-icon { font-size: 0.85rem; }
/* Sopra lo pseudo-elemento di .stretched-link nelle card panoramica */
.card .card-body .gesper-help { position: relative; z-index: 2; }
</style>
