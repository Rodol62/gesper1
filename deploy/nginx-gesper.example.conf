# Esempio Nginx per GESPER (HTTPS terminato qui, proxy verso Gunicorn).
# Adattare server_name, percorsi ssl_certificate, socket Gunicorn e root static/media.

upstream gesper_app {
    server unix:/run/gesper/gunicorn.sock fail_timeout=0;
}

server {
    listen 443 ssl http2;
    server_name gesper1.plazapretoria.it;

    ssl_certificate     /etc/ssl/certs/tuo-cert.pem;
    ssl_certificate_key /etc/ssl/private/tuo-key.pem;

    client_max_body_size 50M;

    location /static/ {
        alias /home/ubuntu/gesper/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /var/www/media/;
    }

    location /gesper-app/ {
        alias /home/ubuntu/gesper-app/;
        try_files $uri $uri/ /gesper-app/index.html;
    }

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://gesper_app;
    }
}
