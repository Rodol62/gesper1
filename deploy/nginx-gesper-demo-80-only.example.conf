# Solo HTTP (porta 80): utile per **Certbot** (challenge) e come base prima del certificato TLS.
# In ``settings_production`` i cookie sessione sono ``Secure``: il login da browser funziona in pratica
# solo dopo **HTTPS** (``certbot --nginx -d …`` o vhost completo ``nginx-gesper-demo-vhost.example.conf``).
#
#   sudo cp deploy/nginx-gesper-demo-80-only.example.conf /etc/nginx/sites-available/gesper-demo
#   (adattare server_name)
#   sudo ln -sf /etc/nginx/sites-available/gesper-demo /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name demo.gesper1.plazapretoria.it;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    client_max_body_size 100M;

    location /static/ {
        alias /var/www/gesper/staticfiles/;
    }

    location /gesper-app/ {
        alias /var/www/gesper-app/;
        try_files $uri $uri/ /gesper-app/index.html;
        add_header Cache-Control "no-cache";
    }

    location ~ ^/media/(.*)$ {
        root /var/www/gesper-demo/documento;
        try_files /media_sandbox/$1 /media/$1 =404;
    }

    location / {
        proxy_pass http://127.0.0.1:8004;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
    }
}
