# ── Incollare nel server { listen 443 ssl …; server_name gesper1.plazapretoria.it; … }
#    SOSTITUIRE l’intero blocco `location / { ... }` che oggi restituisce il testo
#    "GESPER nginx OK (HTTPS)" o altro, con questo unico `location /` verso Gunicorn.
#    Lasciare invariati certificati SSL e le altre location (/static/, /media/, /gesper-app/, include deploy-docs, …).
#    Poi: sudo nginx -t && sudo systemctl reload nginx
#
#    Riferimento completo: deploy/nginx-gesper-vps-standalone.conf

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
    }
