# Includere dentro il server { listen 443 ... } di gesper1, prima di location / → Gunicorn.
# Percorso assoluto su VPS: /var/www/gesper/deploy/nginx-snippet-deploy-docs.conf
# Prerequisito: /etc/nginx/.htpasswd-gesper-deploy (vedi PROCEDURA_DEPLOY.md)
#
# Senza slash finale, /deploy-docs non corrisponde a questa location e finisce in
# location / → proxy Django → 404. Redirect esplicito:

location = /deploy-docs {
    return 301 /deploy-docs/;
}

location ^~ /deploy-docs/ {
    auth_basic "GESPER deploy docs";
    auth_basic_user_file /etc/nginx/.htpasswd-gesper-deploy;
    alias /var/www/gesper/deploy/;
    autoindex on;
    charset utf-8;
    default_type text/plain;
}
