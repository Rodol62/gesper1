# Esempio: www + apex → proxy verso WordPress Aruba + /gesper/ → Gunicorn 8003
# In produzione è integrato in deploy/nginx-gesper-production-split.conf (stesso file sites-enabled/gesper).
#
# Prerequisiti:
# - Certificato TLS con SAN per www e apex (o espansione Let's Encrypt)
# - systemd: gesper-www su 127.0.0.1:8003 (settings_production_www)
# - upstream IPv6 Aruba: aggiornare se il provider sposta il server (verifica con curl Host header)

upstream plazapretoria_aruba_origin {
    server [2a00:6d40:4:2::c209:47]:443;
}

server {
    listen 443 ssl http2;
    server_name www.plazapretoria.it plazapretoria.it;

    ssl_certificate     /etc/letsencrypt/live/gesper1.plazapretoria.it/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gesper1.plazapretoria.it/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 100M;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
    }

    location ^~ /gesper/media/ {
        alias /var/www/media/;
    }

    location ^~ /gesper/static/ {
        alias /var/www/gesper/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location ^~ /gesper/ {
        proxy_pass http://127.0.0.1:8003/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
    }

    location / {
        proxy_pass https://plazapretoria_aruba_origin;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name $host;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }
}

server {
    listen 80;
    server_name www.plazapretoria.it plazapretoria.it;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
