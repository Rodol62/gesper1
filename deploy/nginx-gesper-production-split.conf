# Produzione (split Nginx — legacy / opzionale): tutto il traffico www/apex arriva alla VPS;
# gesper1.plazapretoria.it → Gunicorn 8000 (root); www + apex → proxy WordPress Aruba + /gesper/ → Gunicorn 8003.
# Per architettura separata (WordPress su hosting, solo gesper.* sulla VPS): usare nginx-gesper-vps-standalone.conf.
# Copiare come /etc/nginx/sites-enabled/gesper (dopo backup).
#
# Origine Aruba (IPv6 del piano hosting). Se Aruba sposta il server, aggiornare l'upstream e verificare:
#   curl -g -skI -H "Host: www.plazapretoria.it" "https://[2a00:6d40:4:2::c209:47]/"
#
# Per Gunicorn/Django: sovrascrivere X-Forwarded-Host con il vhost reale, altrimenti
# un client può inviare X-Forwarded-Host fasullo e Django (USE_X_FORWARDED_HOST) risponde 400.
#
# --- Sul server LIVE (dopo Certbot) ---
# Non modificare a mano i blocchi server 443 né le direttive ssl_*: lasciar gestire tutto a
# Certbot (certbot --nginx / renew). Preservare sempre i blocchi listen 80 con
# location ^~ /.well-known/acme-challenge/ per il rinnovo. Evitare blocchi HTTPS duplicati.
# Aggiornare in repo solo la parte applicativa (static, media, proxy_pass, upstream);
# dopo ogni edit sul server: nginx -t && systemctl reload nginx.
# Questo file resta anche riferimento per bootstrap iniziale prima del primo certificato.

# Origine WordPress (Aruba). Verificare l’IPv6/host con Aruba prima del deploy; un solo backend riduce conflitti.
# Esempio verifica: curl -g -skI -H "Host: www.plazapretoria.it" "https://[INDIRIZZO]/"
# Opzionale: seconda riga `server ... backup;` con weight= (vedi documentazione nginx upstream).
upstream plazapretoria_aruba_origin {
    server [2a00:6d40:4:2::c209:47]:443;
}

server {
    listen 80;
    # Solo nomi host: l’IP della VPS non va hardcodato (cambia tra provider). Per test via IP usare server_name _; solo in debug.
    server_name gesper1.plazapretoria.it;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    client_max_body_size 100M;

    location /static/ {
        alias /var/www/gesper/staticfiles/;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
    }
}

server {
    listen 80;
    server_name www.plazapretoria.it plazapretoria.it;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name gesper1.plazapretoria.it;

    client_max_body_size 100M;

    ssl_certificate /etc/letsencrypt/live/gesper1.plazapretoria.it/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gesper1.plazapretoria.it/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location /static/ {
        alias /var/www/gesper/staticfiles/;
    }

    location /gesper-app/ {
        alias /var/www/gesper-app/;
        try_files $uri $uri/ /gesper-app/index.html;
        add_header Cache-Control "no-cache";
    }

    # MEDIA: stesso path di GESPER_DATA_ROOT=/var/www/gesper/documento → …/media/
    location /media/ {
        alias /var/www/gesper/documento/media/;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
    }
}

server {
    listen 443 ssl http2;
    server_name www.plazapretoria.it plazapretoria.it;

    client_max_body_size 100M;

    ssl_certificate /etc/letsencrypt/live/gesper1.plazapretoria.it/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gesper1.plazapretoria.it/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location ^~ /gesper/media/ {
        alias /var/www/gesper/documento/media/;
    }

    location ^~ /gesper/static/ {
        alias /var/www/gesper/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Slash finale su proxy_pass: strip del prefisso /gesper/ verso Gunicorn (settings_production_www + FORCE_SCRIPT_NAME).
    location ^~ /gesper/ {
        proxy_pass http://127.0.0.1:8003/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
        proxy_buffer_size 128k;
        proxy_buffers 8 256k;
        proxy_busy_buffers_size 256k;
    }

    # Tutto il resto (WordPress su Aruba: /, /wp-admin, /wp-content, …)
    location / {
        proxy_pass https://plazapretoria_aruba_origin;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name $host;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        proxy_redirect off;
    }
}
