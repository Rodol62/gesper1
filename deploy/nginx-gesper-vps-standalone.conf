# VPS solo GESPER (modalità separata — consigliata)
# - WordPress su hosting; GESPER su gesper1.plazapretoria.it → Nginx → Gunicorn 8000 (settings_production).
# Sul server: copiare in sites-available → sites-enabled. TLS già emesso: certificati sotto /etc/letsencrypt/live/gesper1.plazapretoria.it/
#
# Systemd: gesper.service (8000). gesper-www (8003) non serve: systemctl disable --now gesper-www
#
# Dopo edit: sudo nginx -t && sudo systemctl reload nginx
# Non duplicare blocchi 443 gestiti da Certbot: aggiornare solo location, proxy, alias.

# HTTP: solo challenge ACME + redirect a HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name gesper1.plazapretoria.it;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name gesper1.plazapretoria.it;

    client_max_body_size 100M;

    ssl_certificate /etc/letsencrypt/live/gesper1.plazapretoria.it/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gesper1.plazapretoria.it/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    # Se esiste: ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location /static/ {
        alias /var/www/gesper/staticfiles/;
    }

    location /gesper-app/ {
        alias /var/www/gesper-app/;
        try_files $uri $uri/ /gesper-app/index.html;
        add_header Cache-Control "no-cache";
    }

    # Documentazione deploy/ (Basic Auth). Snippet: deploy/nginx-snippet-deploy-docs.conf
    # Installazione automatica su VPS: deploy/server-install-deploy-docs-nginx.sh
    include /var/www/gesper/deploy/nginx-snippet-deploy-docs.conf;

    # Media upload (buste paga, CUD, …): stesso path di Django MEDIA_ROOT.
    # Default Hetzner / migrazione Aruba: GESPER_DATA_ROOT=/var/www/gesper → …/gesper/media/
    # Alternativa repo: GESPER_DATA_ROOT=/var/www/gesper/documento → alias …/documento/media/
    # Legacy: /var/www/media/ (solo se env non usa radice gesper)
    location /media/ {
        alias /var/www/gesper/media/;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
    }
}
