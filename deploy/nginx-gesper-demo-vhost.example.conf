# Esempio vhost Nginx: GESPER **solo demo** su sottodominio (Gunicorn 127.0.0.1:8004).
# Allineare percorsi a GESPER_DATA_ROOT in /etc/gesper-demo.env (es. /var/www/gesper-demo/documento).
#
# Installazione tipica:
#   sudo cp deploy/nginx-gesper-demo-vhost.example.conf /etc/nginx/sites-available/gesper-demo
#   Modificare server_name e percorsi certificati / alias.
#   sudo ln -sf /etc/nginx/sites-available/gesper-demo /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d demo.gesper1.plazapretoria.it
#   sudo nginx -t && sudo systemctl reload nginx
#
# /media/: in demo i file scritti stanno sotto media_sandbox/; se hai copiato anche media operativo
# per lettura fallback, puoi duplicare la logica try_files descritta in settings.py (commento sandbox).

upstream gesper_demo_app {
    server 127.0.0.1:8004;
}

server {
    listen 80;
    listen [::]:80;
    server_name demo.gesper1.plazapretoria.it;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name demo.gesper1.plazapretoria.it;

    client_max_body_size 100M;

    ssl_certificate /etc/letsencrypt/live/demo.gesper1.plazapretoria.it/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/demo.gesper1.plazapretoria.it/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    location /static/ {
        alias /var/www/gesper/staticfiles/;
    }

    location /gesper-app/ {
        alias /var/www/gesper-app/;
        try_files $uri $uri/ /gesper-app/index.html;
        add_header Cache-Control "no-cache";
    }

    # File sotto GESPER_DATA_ROOT: prima media_sandbox (scritture demo), poi media (copia clone).
    # Adattare la radice se GESPER_DATA_ROOT in /etc/gesper-demo.env è diverso.
    location ~ ^/media/(.*)$ {
        root /var/www/gesper-demo/documento;
        try_files /media_sandbox/$1 /media/$1 =404;
        add_header Cache-Control "private, max-age=3600";
    }

    location / {
        proxy_pass http://gesper_demo_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
    }
}
